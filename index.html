<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Focus Tracker Pro</title>
    <style>
        :root {
            --bg-primary: #ffffff;
            --bg-secondary: #f4f4f7;
            --text-primary: #1a1a1a;
            --text-secondary: #666666;
            --border: #e1e4e8;
            --accent: #378ADD;
        }

        [data-theme="dark"] {
            --bg-primary: #121212;
            --bg-secondary: #1e1e1e;
            --text-primary: #e4e4e4;
            --text-secondary: #a0a0a0;
            --border: #333333;
        }

        body {
            font-family: -apple-system, sans-serif;
            background-color: var(--bg-secondary);
            color: var(--text-primary);
            margin: 0;
            padding: 10px;
            display: flex;
            justify-content: center;
            transition: all 0.3s ease;
        }

        .container {
            width: 100%;
            max-width: 1000px;
            background: var(--bg-primary);
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            min-height: 95vh;
        }

        .auth-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 70vh;
            text-align: center;
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr; /* Unified vertical list for time-based tracking */
            gap: 20px;
            margin-top: 20px;
        }

        .input-area {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            background: var(--bg-secondary);
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 20px;
        }

        input, button {
            padding: 12px;
            border-radius: 8px;
            border: 1px solid var(--border);
            font-size: 14px;
        }

        .btn-primary { background: var(--accent); color: white; border: none; font-weight: bold; cursor: pointer; }
        
        .task-card {
            background: var(--bg-primary);
            padding: 12px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 8px;
            border: 1px solid var(--border);
        }

        .progress-container {
            height: 8px;
            background: var(--border);
            border-radius: 4px;
            margin: 10px 0 20px 0;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: var(--accent);
            width: 0%;
            transition: width 0.4s ease;
        }

        .hidden { display: none !important; }

        .tab-btn {
            border: none;
            background: none;
            padding: 12px 20px;
            cursor: pointer;
            font-weight: 600;
            color: var(--text-secondary);
            border-bottom: 3px solid transparent;
            transition: all 0.2s;
        }

        .tab-btn.active {
            color: var(--accent);
            border-bottom-color: var(--accent);
        }

        @media (max-width: 600px) {
            .container { padding: 15px; border-radius: 0; }
            .input-area input { width: 100%; }
        }
    </style>
</head>
<body>

<div class="container">
    <div id="loginSection" class="auth-screen">
        <h1>Focus Tracker</h1>
        <button onclick="login()" class="btn-primary" style="padding: 15px 30px;">Login with Google</button>
    </div>

    <div id="appSection" class="hidden">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
            <h2 id="greeting" style="margin:0; font-size: 20px;">Welcome</h2>
            <div>
                <button onclick="toggleTheme()" style="background:none; border:none; font-size: 22px; cursor:pointer;">🌓</button>
                <button onclick="logout()" style="margin-left:15px; font-weight:bold;">Sign Out</button>
            </div>
        </div>

        <div style="display: flex; gap: 5px; margin-bottom: 25px; border-bottom: 1px solid var(--border); overflow-x: auto;">
            <button onclick="switchTab('daily')" id="tabDaily" class="tab-btn active">Daily</button>
            <button onclick="switchTab('weekly')" id="tabWeekly" class="tab-btn">Weekly</button>
            <button onclick="switchTab('monthly')" id="tabMonthly" class="tab-btn">Monthly</button>
            <button onclick="switchTab('yearly')" id="tabYearly" class="tab-btn">Yearly</button>
        </div>

        <div id="progressLabel" style="display:flex; justify-content:space-between; font-weight:bold; font-size: 14px;">
            <span>Current Progress</span>
            <span id="percentText">0%</span>
        </div>
        <div class="progress-container">
            <div id="progressBar" class="progress-fill"></div>
        </div>

        <div class="input-area">
            <input type="text" id="taskInput" placeholder="Enter VLSI or IoT task..." style="flex: 3;">
            <button onclick="addTask()" class="btn-primary" id="addBtn" style="flex: 1;">Add to Daily</button>
        </div>

        <div class="grid" id="tasksGrid"></div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getDatabase, ref, set, onValue, push, remove, update } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBTjnTFxrFYbbNUio6wQvt1Kr-I4mMdecc",
        authDomain: "focus-2026d.firebaseapp.com",
        databaseURL: "https://focus-2026d-default-rtdb.firebaseio.com/",
        projectId: "focus-2026d",
        storageBucket: "focus-2026d.firebasestorage.app",
        messagingSenderId: "668715768658",
        appId: "1:668715768658:web:0eb20f038c18a500f4f88b"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getDatabase(app);
    const provider = new GoogleAuthProvider();

    let currentUID = null;
    let currentTab = 'daily';

    window.login = () => signInWithPopup(auth, provider);
    window.logout = () => signOut(auth);

    onAuthStateChanged(auth, (user) => {
        if (user) {
            currentUID = user.uid;
            document.getElementById('loginSection').classList.add('hidden');
            document.getElementById('appSection').classList.remove('hidden');
            document.getElementById('greeting').textContent = `Hi, ${user.displayName.split(' ')[0]}!`;
            listenToData();
        } else {
            document.getElementById('loginSection').classList.remove('hidden');
            document.getElementById('appSection').classList.add('hidden');
        }
    });

    window.switchTab = (tab) => {
        currentTab = tab;
        document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
        document.getElementById('tab' + tab.charAt(0).toUpperCase() + tab.slice(1)).classList.add('active');
        document.getElementById('addBtn').textContent = 'Add to ' + tab.charAt(0).toUpperCase() + tab.slice(1);
        listenToData();
    };

    window.addTask = () => {
        const input = document.getElementById('taskInput');
        if (!input.value.trim()) return;

        push(ref(db, `users/${currentUID}/${currentTab}`), {
            text: input.value,
            completed: false,
            timestamp: Date.now()
        });
        input.value = '';
    };

    function listenToData() {
        onValue(ref(db, `users/${currentUID}/${currentTab}`), (snapshot) => {
            renderTasks(snapshot.val());
        });
    }

    window.toggleTask = (taskId, currentStatus) => {
        update(ref(db, `users/${currentUID}/${currentTab}/${taskId}`), { completed: !currentStatus });
    };

    window.deleteTask = (taskId) => {
        remove(ref(db, `users/${currentUID}/${currentTab}/${taskId}`));
    };

    function renderTasks(tasks) {
        const grid = document.getElementById('tasksGrid');
        grid.innerHTML = '';
        
        let allTasks = tasks ? Object.entries(tasks) : [];
        let completedCount = allTasks.filter(([id, t]) => t.completed).length;
        let percent = allTasks.length > 0 ? Math.round((completedCount / allTasks.length) * 100) : 0;

        // Update Progress UI
        document.getElementById('percentText').textContent = percent + '%';
        document.getElementById('progressBar').style.width = percent + '%';

        if (allTasks.length === 0) {
            grid.innerHTML = `<p style="text-align:center; color:var(--text-secondary); margin-top: 30px;">No ${currentTab} tasks yet.</p>`;
            return;
        }

        allTasks.sort((a,b) => b[1].timestamp - a[1].timestamp).forEach(([id, t]) => {
            const item = document.createElement('div');
            item.className = 'task-card';
            item.innerHTML = `
                <input type="checkbox" ${t.completed ? 'checked' : ''} style="cursor:pointer; width:20px; height:20px;">
                <span style="flex:1; cursor:pointer; font-size:15px; ${t.completed ? 'text-decoration:line-through; opacity:0.5' : ''}">${t.text}</span>
                <span style="cursor:pointer; opacity:0.4; font-size: 18px; padding:0 5px;">✕</span>
            `;
            item.querySelector('input').onclick = () => window.toggleTask(id, t.completed);
            item.querySelector('span:nth-child(2)').onclick = () => window.toggleTask(id, t.completed);
            item.querySelector('span:last-child').onclick = () => window.deleteTask(id);
            grid.appendChild(item);
        });
    }

    window.toggleTheme = () => {
        const current = document.documentElement.getAttribute('data-theme');
        document.documentElement.setAttribute('data-theme', current === 'dark' ? 'light' : 'dark');
    };
</script>
</body>
</html>
