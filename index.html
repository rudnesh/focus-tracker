<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Focus Tracker Pro</title>
    <style>
        :root {
            --bg-primary: #ffffff;
            --bg-secondary: #f4f4f7;
            --text-primary: #1a1a1a;
            --text-secondary: #666666;
            --border: #e1e4e8;
            --accent: #378ADD;
            --danger: #d93025;
            --complete: #007bff;
            --incomplete: #d93025;
            --warning: #f29900;
        }
        [data-theme="dark"] {
            --bg-primary: #121212;
            --bg-secondary: #1e1e1e;
            --text-primary: #e4e4e4;
            --text-secondary: #a0a0a0;
            --border: #333333;
        }
        body { font-family: -apple-system, sans-serif; background-color: var(--bg-secondary); color: var(--text-primary); margin: 0; padding: 0; display: flex; justify-content: center; transition: all 0.3s ease; }
        .container { width: 100%; max-width: 1000px; background: var(--bg-primary); padding: 20px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); min-height: 100vh; box-sizing: border-box; }
        .auth-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 70vh; text-align: center; }
        
        .dashboard { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 12px; margin-bottom: 20px; }
        .stat-card { background: var(--bg-secondary); padding: 12px; border-radius: 12px; text-align: center; border: 1px solid var(--border); }
        .stat-value { font-size: 20px; font-weight: bold; display: block; }
        .stat-label { font-size: 10px; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 1px; }

        /* Overdue Dashboard Section */
        .overdue-section { background: rgba(217, 48, 37, 0.1); border: 1px solid var(--danger); border-radius: 12px; padding: 15px; margin-bottom: 25px; }
        .overdue-item { display: flex; justify-content: space-between; font-size: 13px; margin-bottom: 5px; padding-bottom: 5px; border-bottom: 0.5px solid rgba(217, 48, 37, 0.2); }

        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; }
        .input-area { display: flex; flex-direction: row; gap: 10px; background: var(--bg-secondary); padding: 15px; border-radius: 12px; margin-bottom: 20px; flex-wrap: wrap; }
        
        input, select, button { padding: 10px; border-radius: 8px; border: 1px solid var(--border); font-size: 14px; background: var(--bg-primary); color: var(--text-primary); }
        .btn-primary { background: var(--accent); color: white; border: none; font-weight: bold; cursor: pointer; }
        
        .task-card { display: flex; align-items: center; gap: 10px; padding: 12px; border-radius: 10px; margin-bottom: 8px; border: 1.5px solid var(--border); position: relative; }
        .task-incomplete { border-color: var(--incomplete); background: rgba(217, 48, 37, 0.03); }
        .task-complete { border-color: var(--complete); background: rgba(0, 123, 255, 0.03); }
        .deadline-tag { font-size: 10px; position: absolute; right: 40px; top: 5px; color: var(--warning); font-weight: bold; }
        
        .progress-container { height: 6px; background: var(--border); border-radius: 3px; margin-bottom: 15px; overflow: hidden; }
        .progress-fill { height: 100%; background: var(--accent); width: 0%; transition: width 0.4s ease; }
        
        .tab-btn { border: none; background: none; padding: 12px 15px; cursor: pointer; font-weight: 600; color: var(--text-secondary); border-bottom: 3px solid transparent; }
        .tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }
        .hidden { display: none !important; }

        @media (max-width: 600px) { 
            .input-area { flex-direction: column; } 
            .input-area > * { width: 100% !important; }
        }
    </style>
</head>
<body>

<div class="container">
    <div id="loginSection" class="auth-screen">
        <h1>Focus Tracker</h1>
        <button onclick="login()" class="btn-primary" style="padding: 15px 30px;">Login with Google</button>
    </div>

    <div id="appSection" class="hidden">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
            <h2 id="greeting" style="margin:0; font-size: 18px;">Welcome</h2>
            <div style="display: flex; gap: 10px;">
                <button onclick="toggleTheme()" style="background:none; border:none; font-size: 20px; cursor:pointer;">🌓</button>
                <button onclick="logout()" style="font-size: 12px;">Sign Out</button>
            </div>
        </div>

        <div id="overdueDashboard" class="overdue-section hidden">
            <h4 style="margin: 0 0 10px 0; color: var(--danger); font-size: 12px;">⚠️ DEADLINES REACHED / OVERDUE</h4>
            <div id="overdueList"></div>
        </div>

        <div class="dashboard">
            <div class="stat-card"><span class="stat-value" id="totalTasks">0</span><span class="stat-label">Total</span></div>
            <div class="stat-card"><span class="stat-value" id="doneTasks" style="color:var(--complete)">0</span><span class="stat-label">Done</span></div>
            <div class="stat-card"><span class="stat-value" id="pendingTasks" style="color:var(--incomplete)">0</span><span class="stat-label">Pending</span></div>
        </div>

        <div style="display: flex; gap: 5px; margin-bottom: 20px; border-bottom: 1px solid var(--border); overflow-x: auto;">
            <button onclick="switchTab('daily')" id="tabDaily" class="tab-btn active">Daily</button>
            <button onclick="switchTab('weekly')" id="tabWeekly" class="tab-btn">Weekly</button>
            <button onclick="switchTab('monthly')" id="tabMonthly" class="tab-btn">Monthly</button>
            <button onclick="switchTab('yearly')" id="tabYearly" class="tab-btn">Yearly</button>
        </div>

        <div class="input-area">
            <input type="text" id="taskInput" placeholder="New task..." style="flex: 2;">
            <select id="categorySelect" style="flex: 1;"></select>
            <input type="date" id="deadlineInput" class="hidden" style="flex: 1;">
            <button onclick="addTask()" class="btn-primary">Add</button>
        </div>

        <div class="grid" id="tasksGrid"></div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getDatabase, ref, set, onValue, push, remove, update } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBTjnTFxrFYbbNUio6wQvt1Kr-I4mMdecc",
        authDomain: "focus-2026d.firebaseapp.com",
        databaseURL: "https://focus-2026d-default-rtdb.firebaseio.com/",
        projectId: "focus-2026d",
        storageBucket: "focus-2026d.firebasestorage.app",
        messagingSenderId: "668715768658",
        appId: "1:668715768658:web:0eb20f038c18a500f4f88b"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getDatabase(app);
    const provider = new GoogleAuthProvider();

    let currentUID = null;
    let currentTab = 'daily';
    let myCategories = ['Work', 'Personal'];

    window.login = () => signInWithPopup(auth, provider);
    window.logout = () => signOut(auth);

    onAuthStateChanged(auth, (user) => {
        if (user) {
            currentUID = user.uid;
            document.getElementById('loginSection').classList.add('hidden');
            document.getElementById('appSection').classList.remove('hidden');
            document.getElementById('greeting').textContent = `Hi, ${user.displayName.split(' ')[0]}!`;
            loadUserCategories();
            listenToData();
            updateDashboard(); // Continuous listener for stats and deadlines
        } else {
            document.getElementById('loginSection').classList.remove('hidden');
            document.getElementById('appSection').classList.add('hidden');
        }
    });

    function loadUserCategories() {
        onValue(ref(db, `users/${currentUID}/settings/categories`), (snap) => {
            const data = snap.val();
            if (data) myCategories = data;
            const select = document.getElementById('categorySelect');
            select.innerHTML = myCategories.map(cat => `<option value="${cat}">${cat}</option>`).join('');
        });
    }

    // DASHBOARD & DEADLINE LOGIC
    function updateDashboard() {
        onValue(ref(db, `users/${currentUID}`), (snapshot) => {
            const data = snapshot.val();
            const overdueList = document.getElementById('overdueList');
            const dashboardSection = document.getElementById('overdueDashboard');
            
            let total = 0, done = 0, overdueHtml = "";
            const today = new Date().toISOString().split('T')[0];

            if (data) {
                ['daily', 'weekly', 'monthly', 'yearly'].forEach(tab => {
                    if (data[tab]) {
                        Object.entries(data[tab]).forEach(([id, t]) => {
                            total++;
                            if (t.completed) {
                                done++;
                            } else if (t.deadline && t.deadline <= today) {
                                // Reached deadline logic
                                overdueHtml += `
                                    <div class="overdue-item">
                                        <span><strong>[${tab.toUpperCase()}]</strong> ${t.text} (Due: ${t.deadline})</span>
                                        <a href="#" onclick="switchTab('${tab}')" style="color:var(--accent); font-weight:bold;">VIEW →</a>
                                    </div>`;
                            }
                        });
                    }
                });
            }

            document.getElementById('totalTasks').textContent = total;
            document.getElementById('doneTasks').textContent = done;
            document.getElementById('pendingTasks').textContent = total - done;

            if (overdueHtml) {
                overdueList.innerHTML = overdueHtml;
                dashboardSection.classList.remove('hidden');
            } else {
                dashboardSection.classList.add('hidden');
            }
        });
    }

    window.switchTab = (tab) => {
        currentTab = tab;
        document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
        document.getElementById('tab' + tab.charAt(0).toUpperCase() + tab.slice(1)).classList.add('active');
        
        // Hide/Show Deadline input
        const dateInput = document.getElementById('deadlineInput');
        if (tab === 'daily') dateInput.classList.add('hidden');
        else dateInput.classList.remove('hidden');
        
        listenToData();
    };

    window.addTask = () => {
        const input = document.getElementById('taskInput');
        const category = document.getElementById('categorySelect').value;
        const deadline = document.getElementById('deadlineInput').value;
        if (!input.value.trim()) return;

        push(ref(db, `users/${currentUID}/${currentTab}`), {
            text: input.value.trim(),
            category: category,
            deadline: (currentTab !== 'daily' && deadline) ? deadline : null,
            completed: false,
            timestamp: Date.now()
        });
        input.value = '';
    };

    function listenToData() {
        onValue(ref(db, `users/${currentUID}/${currentTab}`), (snapshot) => {
            renderTasks(snapshot.val());
        });
    }

    window.toggleTask = (taskId, currentStatus) => {
        update(ref(db, `users/${currentUID}/${currentTab}/${taskId}`), { completed: !currentStatus });
    };

    window.deleteTask = (taskId) => {
        remove(ref(db, `users/${currentUID}/${currentTab}/${taskId}`));
    };

    function renderTasks(tasks) {
        const grid = document.getElementById('tasksGrid');
        grid.innerHTML = '';
        if (!tasks) {
            grid.innerHTML = `<p style="text-align:center; width:100%; color:var(--text-secondary); margin-top:40px;">No tasks here.</p>`;
            return;
        }

        const taskEntries = Object.entries(tasks);
        const categoriesInUse = [...new Set(taskEntries.map(([id, t]) => t.category))].sort();

        categoriesInUse.forEach(cat => {
            const catTasks = taskEntries.filter(([id, t]) => t.category === cat);
            const catDone = catTasks.filter(([id, t]) => t.completed).length;
            const percent = Math.round((catDone / catTasks.length) * 100);

            const col = document.createElement('div');
            col.innerHTML = `
                <div class="category-header">
                    <h3 style="font-size: 14px; border-left: 3px solid var(--accent); padding-left: 8px; margin: 0;">${cat.toUpperCase()}</h3>
                    <span style="font-size: 12px; font-weight: bold; color: var(--accent);">${percent}%</span>
                </div>
                <div class="progress-container"><div class="progress-fill" style="width:${percent}%"></div></div>
            `;

            catTasks.sort((a,b) => b[1].timestamp - a[1].timestamp).forEach(([id, t]) => {
                const item = document.createElement('div');
                item.className = `task-card ${t.completed ? 'task-complete' : 'task-incomplete'}`;
                item.innerHTML = `
                    ${t.deadline && !t.completed ? `<span class="deadline-tag">📅 ${t.deadline}</span>` : ''}
                    <input type="checkbox" ${t.completed ? 'checked' : ''} style="cursor:pointer; width:18px; height:18px;">
                    <span style="flex:1; cursor:pointer; font-size:14px; ${t.completed ? 'text-decoration:line-through; opacity:0.5' : ''}">${t.text}</span>
                    <span style="cursor:pointer; opacity:0.3; padding:5px;">✕</span>
                `;
                item.querySelector('input').onclick = () => window.toggleTask(id, t.completed);
                item.querySelector('span:nth-child(2)').onclick = () => window.toggleTask(id, t.completed);
                item.querySelector('span:last-child').onclick = () => window.deleteTask(id);
                col.appendChild(item);
            });
            grid.appendChild(col);
        });
    }

    window.toggleTheme = () => {
        const current = document.documentElement.getAttribute('data-theme');
        document.documentElement.setAttribute('data-theme', current === 'dark' ? 'light' : 'dark');
    };
    
    // Default categories setup
    window.promptNewCategory = () => {
        const name = prompt("Enter new category name:");
        if (name && !myCategories.includes(name.trim())) {
            myCategories.push(name.trim());
            set(ref(db, `users/${currentUID}/settings/categories`), myCategories);
        }
    };
    window.deleteSelectedCategory = () => {
        const select = document.getElementById('categorySelect');
        const toDelete = select.value;
        if (!toDelete || myCategories.length <= 1) return;
        if (confirm(`Remove "${toDelete}"?`)) {
            myCategories = myCategories.filter(c => c !== toDelete);
            set(ref(db, `users/${currentUID}/settings/categories`), myCategories);
        }
    };
</script>
</body>
</html>
